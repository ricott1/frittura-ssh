# Catalogue of SSH games the hub knows how to forward to.
# Each entry produces one row in the lobby menu. When the user picks an entry,
# the hub opens an outbound SSH connection to (host, port) and bridges the
# user's session through. host/port can be loopback for local dev.

[[games]]
key = "sshattrick"
name = "ssHattrick"
description = "Hockey in your terminal."
host = "127.0.0.1"
port = 3020

[[games]]
key = "stonks"
name = "stonks"
description = "A multiplayer terminal stock market simulator."
host = "127.0.0.1"
port = 3030

[[games]]
key = "asterion"
name = "asterion"
description = "Find your way out of a dangerouSSH labyrinth."
host = "127.0.0.1"
port = 2020
